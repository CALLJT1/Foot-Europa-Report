<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foot Europa Report</title>
<style>
body { font-family: Arial, Helvetica, sans-serif; background: #f4f4f4; margin:0; padding:0; }
header { background:#000; color:#fff; padding:15px 20px; text-align:center; font-size:2em; font-weight:bold; }
main { width:90%; max-width:1200px; margin:20px auto; }
.top-story { text-align:center; font-size:1.8em; font-weight:bold; margin-bottom:30px; }
.news-section { display:flex; flex-wrap:wrap; gap:20px; justify-content:center; }
.column { flex:1; min-width:250px; }
.column h3 { background:#000; color:#fff; padding:8px; margin-bottom:10px; border-radius:4px; text-align:center; }
.headline { margin:8px 0; text-align:center; }
.headline a { text-decoration:none; color:#000; display:block; }
.headline a:hover { text-decoration:underline; }
footer { text-align:center; margin:40px 0; font-size:0.9em; color:#555; }
img { max-width:100%; border-radius:4px; display:block; margin:0 auto 5px auto; object-fit:cover; }
</style>
</head>
<body>

<header>Foot Europa Report</header>

<main>
    <!-- Top Story -->
    <div id="top-story" class="top-story">Loading top story...</div>

    <!-- News Section -->
    <div id="news" class="news-section">
        <div class="column">
            <h3>Premier League</h3>
            <div id="pl-news"></div>
        </div>
        <div class="column">
            <h3>La Liga</h3>
            <div id="laliga-news"></div>
        </div>
        <div class="column">
            <h3>Serie A</h3>
            <div id="seriea-news"></div>
        </div>
        <div class="column">
            <h3>Bundesliga</h3>
            <div id="bundesliga-news"></div>
        </div>
        <div class="column">
            <h3>Ligue 1</h3>
            <div id="ligue1-news"></div>
        </div>
    </div>
</main>

<footer>© 2026 Foot Europa Report</footer>

<script src="news.js"></script>
</body>
</html>
