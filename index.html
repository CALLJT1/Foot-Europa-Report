<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Euro Soccer News</title>\n    <style>\n        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }\n        h1, h2 { color: #333; }\n        .league { margin-bottom: 20px; padding: 10px; background: #fff; border-radius: 5px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); }\n    </style>\n</head>\n<body>\n    <h1>Euro Soccer News</h1>\n    <div id="premier-league" class="league">\n        <h2>Premier League</h2>\n        <div class="content"></div>\n    </div>\n    <div id="la-liga" class="league">\n        <h2>La Liga</h2>\n        <div class="content"></div>\n    </div>\n    <div id="serie-a" class="league">\n        <h2>Serie A</h2>\n        <div class="content"></div>\n    </div>\n    <div id="other-leagues" class="league">\n        <h2>Other Leagues</h2>\n        <div class="content"></div>\n    </div>\n\n    <script>\n        // Fetch dynamic content for each league and inject it into the respective divs\n        function fetchLeagueNews(league) {\n            // Here you would normally make a request to a news API\n            // For demonstration, we'll use static content\n            let news = `Latest news for ${league}`;\n            document.querySelector(`#${league} .content`).innerHTML = news;\n        }\n\n        fetchLeagueNews('premier-league');\n        fetchLeagueNews('la-liga');\n        fetchLeagueNews('serie-a');\n        fetchLeagueNews('other-leagues');\n    <\/script>\n</body>\n</html>
