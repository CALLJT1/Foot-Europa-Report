<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foot Europa Report</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#f4f4f4;
margin:0;
padding:0;
}

header{
background:#000;
color:#fff;
padding:20px;
text-align:center;
font-size:2em;
font-weight:bold;
}

main{
width:90%;
max-width:1200px;
margin:20px auto;
}

.top-story{
text-align:center;
margin-bottom:25px;
}

.category-tabs{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.category-tabs button{
padding:10px 20px;
background:#000;
color:#fff;
border:none;
cursor:pointer;
border-radius:4px;
}

.category-tabs button.active{
background:#0066cc;
}

.category-tabs button:hover{
background:#333;
}

.news-section{
display:flex;
flex-wrap:wrap;
gap:20px;
}

.column{
flex:1;
min-width:250px;
}

.column h3{
background:#000;
color:#fff;
padding:10px;
margin:0 0 10px 0;
border-radius:4px;
}

.headline{
font-size:1.05em;
margin:8px 0;
}

.headline a{
color:#000;
text-decoration:none;
}

.headline a:hover{
text-decoration:underline;
}

.hidden{
display:none;
}

footer{
text-align:center;
margin:40px 0;
font-size:0.9em;
color:#555;
}

img{
max-width:100%;
border-radius:4px;
}

</style>
</head>

<body>

<header>
Foot Europa Report
</header>

<main>

<div id="top-story" class="top-story">
Loading top story...
</div>

<div class="category-tabs">
<button class="active" onclick="showCategory('news',event)">News</button>
<button onclick="showCategory('transfers',event)">Transfers</button>
</div>

<div id="news" class="news-section">

<div class="column">
<h3>Premier League</h3>
<div id="pl-news">Loading...</div>
</div>

<div class="column">
<h3>La Liga</h3>
<div id="laliga-news">Loading...</div>
</div>

<div class="column">
<h3>Serie A</h3>
<div id="seriea-news">Loading...</div>
</div>

<div class="column">
<h3>Bundesliga</h3>
<div id="bundesliga-news">Loading...</div>
</div>

<div class="column">
<h3>Ligue 1</h3>
<div id="ligue1-news">Loading...</div>
</div>

<div class="column">
<h3>Champions League</h3>
<div id="ucl-news">Loading...</div>
</div>

</div>

<div id="transfers" class="news-section hidden">

<div class="column">
<h3>BBC Transfers</h3>
<div id="transfer-news">Loading...</div>
</div>

<div class="column">
<h3>Sky Sports</h3>
<div id="skysports-transfers">Loading...</div>
</div>

<div class="column">
<h3>ESPN Transfers</h3>
<div id="espn-transfers">Loading...</div>
</div>

</div>

</main>

<footer>
© 2026 Foot Europa Report
</footer>

<script src="news.js"></script>

</body>
</html>
